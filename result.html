<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>지원 결과</title>
</head>

<body>

<h2>내 지원 결과</h2>

<h3 id="expectedResult" style="color:blue"></h3>

<a href="status.html">전체 대학 지원 현황 보기</a>

<table border="1">
<thead>
<tr>
<th>대학</th>
<th>지망</th>
<th>총점</th>
<th>순위</th>
<th>결과</th>
</tr>
</thead>

<tbody id="resultTable"></tbody>
</table>

<br><br>

<div id="applicants"></div>

<br>

<div id="studentDetail"></div>

<h3>🔥 인기 대학 TOP5</h3>

<table border="1">
<thead>
<tr>
<th>순위</th>
<th>대학</th>
<th>국가</th>
<th>경쟁률</th>
</tr>
</thead>

<tbody id="topTable"></tbody>
</table>

<h3>🧭 내 지망 전략 분석</h3>
<div id="strategyBox"></div>
  
<h3>📊 내 점수 기준 추천 대학</h3>

<table border="1">
<thead>
<tr>
<th>대학</th>
<th>국가</th>
<th>컷라인</th>
<th>내 점수</th>
<th>판단</th>
</tr>
</thead>

<tbody id="recommendTable"></tbody>
</table>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let myScore = 0;
  
let userEmail=localStorage.getItem("userEmail");

if(!userEmail){
alert("로그인이 필요합니다");
window.location.href="index.html";
}

fetch(API_URL+"?action=myresults&email="+userEmail)

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("resultTable");
table.innerHTML="";

data.forEach((r, i)=>{
  if(i === 0) myScore = Number(r.total);
  
  let row=document.createElement("tr");

row.innerHTML=`
<td class="uni" data-uni="${r.university}" style="cursor:pointer;color:blue">
▶ ${r.university}
</td>
<td>${r.choice_rank}</td>
<td>${Number(r.total).toFixed(2)}</td>
<td>${r.rank}</td>
<td>${r.result === "미선발" ? "" : r.result}</td>
`;

table.appendChild(row);

});

let assigned = data.find(r => r.result === "합격");

if(assigned){
document.getElementById("expectedResult").innerHTML =
"📍 현재 예상 배정 대학: <b>" + assigned.university + "</b> (" + assigned.choice_rank + "지망)";
}else{
document.getElementById("expectedResult").innerHTML =
"📍 현재 예상 배정 대학: 없음 (미선발)";
}

loadRecommendedUniversities();
analyzeStrategy(data);

document.querySelectorAll(".uni").forEach(el=>{
el.addEventListener("click",function(){

let box=document.getElementById("applicants");

/* 모든 화살표 초기화 */
document.querySelectorAll(".uni").forEach(u=>{
u.innerText="▶ "+u.dataset.uni;
});

/* 같은 대학 다시 클릭하면 닫기 */
if(box.dataset.open===this.dataset.uni){
box.innerHTML="";
box.dataset.open="";
return;
}

/* 새 대학 열기 */
showApplicants(this.dataset.uni);
box.dataset.open=this.dataset.uni;
this.innerText="▼ "+this.dataset.uni;

});
});

});


function showApplicants(university){

fetch(API_URL+"?action=applicants&university="+encodeURIComponent(university))

.then(res=>res.json())

.then(data=>{

if(data.length === 0){
document.getElementById("applicants").innerHTML =
"<h3>"+university+" 지원자 없음</h3>";
return;
}

let html="<h3>"+university+" 지원자 목록</h3>";

let seats = Number(data[0]?.seats);
let applicants = data.length;

html += "<p>정원: "+(seats || "?")+"명</p>";
html += "<p>지원자: "+applicants+"명</p>";

let myRank = data.find(r => r.email === userEmail)?.rank;

if(myRank){
html += "<p><b>📍 내 순위: "+myRank+" / "+applicants+"</b></p>";
}

if(typeof seats === "number" && seats > 0){
let rate = (applicants/seats).toFixed(2);
html += "<p>경쟁률: "+rate+" : 1</p>";
}

let cutoff;

if(seats > 0 && applicants >= seats){
cutoff = Number(data[seats-1]?.total);
}else{
cutoff = Number(data[applicants-1]?.total);
}
  
if(cutoff !== undefined){
  html += "<p>현재 합격 예상선: "+Number(cutoff).toFixed(2)+"</p>";
  html += "<p>내 점수: "+myScore.toFixed(2)+"</p>";

  let diff = myScore - cutoff;

  let chance;

if(diff >= 3){
chance = 90;
}
else if(diff >= 1){
chance = 70;
}
else if(diff >= 0){
chance = 55;
}
else if(diff >= -1){
chance = 30;
}
else{
chance = 10;
}

html += `<p><b>🎯 합격 가능성: ${chance}%</b></p>`;

html += `
<div style="width:200px;background:#eee;height:10px;border-radius:5px;">
<div style="width:${chance}%;background:green;height:10px;border-radius:5px;"></div>
</div>
`;

if(diff >= 2){
  html += "<p style='color:green'><b>🟢 안정 지원</b></p>";
}
else if(diff >= 0){
  html += "<p style='color:orange'><b>🟡 합격 가능</b></p>";
}
else{
  html += "<p style='color:red'><b>🔴 위험</b></p>";
}
}else{
  html += "<p>현재 합격 예상선: 계산 불가</p>";
  html += "<p>내 점수: "+myScore.toFixed(2)+"</p>";
}

html+="<table border='1'>";
html+="<tr><th>순위</th><th>별명</th><th>총점</th><th>지망</th></tr>";

data.forEach(r=>{

let highlight = "";

if(r.email === userEmail){
highlight = "background-color:#ffe9a8;font-weight:bold;";
}

html+=`
<tr class="student" data-email="${r.email}" style="cursor:pointer;${highlight}">
<td>${r.rank}</td>
<td>${r.nickname}</td>
<td>${Number(r.total).toFixed(2)}</td>
<td>${r.choice}</td>
</tr>
`;
});

html+="</table>";

document.getElementById("applicants").innerHTML = html;
document.getElementById("studentDetail").innerHTML = "";
document.getElementById("studentDetail").dataset.open="";

document.querySelectorAll(".student").forEach(el=>{
el.addEventListener("click",function(){

let box=document.getElementById("studentDetail");

if(box.dataset.open===this.dataset.email){
box.innerHTML="";
box.dataset.open="";
return;
}

showStudent(this.dataset.email);
box.dataset.open=this.dataset.email;

});
});

});

}


function showStudent(email){

fetch(API_URL+"?action=student&email="+encodeURIComponent(email))

.then(res=>res.json())

.then(data=>{

if(!data) return;

let html="<h3>"+data.nickname+" 지원 대학</h3>";

html+="<ul>";
html+="<li>1지망: "+(data.choice1||"없음")+"</li>";
html+="<li>2지망: "+(data.choice2||"없음")+"</li>";
html+="<li>3지망: "+(data.choice3||"없음")+"</li>";
html+="<li>4지망: "+(data.choice4||"없음")+"</li>";
html+="<li>5지망: "+(data.choice5||"없음")+"</li>";
html+="</ul>";

let box = document.getElementById("studentDetail");

box.innerHTML = html;

});

}

/* 인기 대학 TOP5 불러오기 */

function loadTopUniversities(){

fetch(API_URL+"?action=status")

.then(res=>res.json())

.then(data=>{

data.sort(function(a,b){

let A=parseFloat(a.rate);
let B=parseFloat(b.rate);

return B-A;

});

let table=document.getElementById("topTable");

if(!table) return;

table.innerHTML="";

data.slice(0,5).forEach((u,i)=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${i+1}</td>
<td>${u.name}</td>
<td>${u.country}</td>
<td>${u.rate}</td>
`;

table.appendChild(row);

});

});

}

function loadRecommendedUniversities(){

fetch(API_URL+"?action=status")

.then(res=>res.json())

.then(data=>{

data.sort(function(a,b){

let A=parseFloat(a.cutoff)||999;
let B=parseFloat(b.cutoff)||999;

return A-B;

});

let table=document.getElementById("recommendTable");

if(!table) return;

table.innerHTML="";

data.forEach(u=>{

let cutoff = parseFloat(u.cutoff);

let status="";
let color="black";

if(!isNaN(cutoff)){

let diff = myScore - cutoff;

if(diff >= 2){
status="🟢 안정";
color="green";
}
else if(diff >= 0){
status="🟡 가능";
color="orange";
}
else{
status="🔴 위험";
color="red";
}

}

let row=document.createElement("tr");

row.innerHTML=`
<td>${u.name}</td>
<td>${u.country}</td>
<td>${!isNaN(cutoff) ? cutoff.toFixed(2) : "-"}</td>
<td>${myScore.toFixed(2)}</td>
<td style="color:${color};font-weight:bold">${status}</td>
`;

table.appendChild(row);

});

});

}

function analyzeStrategy(data){

fetch(API_URL+"?action=status")
.then(res=>res.json())
.then(statusData=>{

let html="";

data.forEach(r=>{

let uni = statusData.find(u=>u.name===r.university);

if(!uni) return;

let cutoff = parseFloat(uni.cutoff);
let diff = myScore - cutoff;

let status="";

if(isNaN(cutoff)){
status="🟢 안정";
}
else if(diff >= 2){
status="🟢 안정";
}
else if(diff >= 0){
status="🟡 가능";
}
else{
status="🔴 위험";
}

html += `<p>${r.choice_rank}지망 ${r.university} : <b>${status}</b></p>`;

});

document.getElementById("strategyBox").innerHTML = html;

});

}
  
loadTopUniversities();
setInterval(loadTopUniversities,10000);
  
</script>

</body>
</html>
