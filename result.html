function calculateProbability(u){

  if(probabilityCache[u.name] !== undefined) return probabilityCache[u.name];

  let scores = (u.score_distribution || "")
    .split(",")
    .map(Number)
    .filter(x => !isNaN(x));

  if(scores.length === 0){
    probabilityCache[u.name] = 50;
    return 50;
  }

  scores.sort((a,b)=>b-a);

  let seats = Number(u.seats) || 1;

  // 🔥 내 예상 순위
  let rank = scores.filter(s => s > myScore).length + 1;

  let cutoff = calculateDynamicCutoff(u);

let diff = myScore - cutoff;

let prob = 100 / (1 + Math.exp(-diff * 0.7));

// ⭐ 여기 추가 (핵심)
let percentile = rank / scores.length;
prob += (0.5 - percentile) * 20;

prob = Math.round(prob);

if(prob < 5) prob = 5;
if(prob > 95) prob = 95;

  probabilityCache[u.name] = prob;
  return prob;
}
  
function generateAutoCombination(universities){

  let safe = [];
  let match = [];
  let reach = [];

  universities.forEach(u=>{
    let cutoff = calculateDynamicCutoff(u);
    if(isNaN(cutoff)) cutoff = myScore;

    let prob = calculateProbability(u);

    if(prob >= 70) safe.push(u);
    else if(prob >= 40) match.push(u);
    else reach.push(u);
  });

  // 정렬
  const sortFn = (a,b)=>{
let ca = calculateDynamicCutoff(a);
let cb = calculateDynamicCutoff(b);
  if(isNaN(ca)) ca = myScore;
  if(isNaN(cb)) cb = myScore;
  return Math.abs(myScore - ca) - Math.abs(myScore - cb);
};

  safe.sort(sortFn);
  match.sort(sortFn);
  reach.sort(sortFn);

  let picks = [];

  if(reach[0]) picks.push({rank:1, name:reach[0].name, type:"🔥 상향"});
  if(match[0]) picks.push({rank:2, name:match[0].name, type:"🟡 적정"});
  if(match[1]) picks.push({rank:3, name:match[1].name, type:"🟡 적정"});
  if(safe[0]) picks.push({rank:4, name:safe[0].name, type:"🟢 안정"});
  if(safe[1]) picks.push({rank:5, name:safe[1].name, type:"🟢 안정"});

  let html = "";

  picks.forEach(p=>{
    html += `${p.rank}지망: ${p.name} (${p.type})<br>`;
  });

  document.getElementById("autoStrategyBox").innerHTML = html;
}

function generateStrategy(universities){

  universities.sort((a,b)=>{
    let diffA = Math.abs(myScore - calculateDynamicCutoff(a));
let diffB = Math.abs(myScore - calculateDynamicCutoff(b));
    return diffA - diffB;
  });

  const result = {
    safe: [],
    match: [],
    reach: []
  };

  universities.forEach(u=>{
    let cutoff = calculateDynamicCutoff(u);
    if(isNaN(cutoff)) cutoff = myScore;

    let prob = calculateProbability(u);

    if(prob >= 70){
      result.safe.push(u.name);
    }
    else if(prob >= 40){
      result.match.push(u.name);
    }
    else{
      result.reach.push(u.name);
    }
  });

  let text = "";

  if(result.safe.length){
    text += "🟢 안정: " + result.safe.join(", ") + "<br>";
  }
  if(result.match.length){
    text += "🟡 적정: " + result.match.join(", ") + "<br>";
  }
  if(result.reach.length){
    text += "🔴 상향: " + result.reach.join(", ") + "<br>";
  }

  text += "<br><b>👉 전략: 안정 1~2 + 적정 2 + 상향 1 추천</b>";

  document.getElementById("strategyBox").innerHTML = text;
}

function generateOptimalCombination(universities){

let strategyType = document.querySelector('input[name="strategyType"]:checked')?.value || "safe";  

universities = universities.filter(u => u.name !== assignedUniversity);  

if(universities.length < 5){
  document.getElementById("optimalStrategyBox").innerHTML =
    "⚠️ 추천 가능한 대학이 부족합니다 (최소 5개 필요)";
  return;
}  

  // 확률 계산 포함
let enriched = universities.map(u=>{
  let cutoff = calculateDynamicCutoff(u);
  if(isNaN(cutoff)) cutoff = myScore;

  let prob = calculateProbability(u);

  let diff = myScore - cutoff;

  // 🔥 전략 반영
  if(strategyType === "challenge"){
    prob += diff * -3;
  }
  else if(strategyType === "balanced"){
    prob += diff * -1;
  }

  // 범위 제한
  if(prob > 95) prob = 95;
  if(prob < 5) prob = 5;

  return {
  name: u.name,
  prob: prob / 100,
  country: u.country || "unknown"
};
});

  let bestCombo = [];
  let bestProb = 0;

  // 5개 조합 brute force (간단 버전)
  for(let i=0;i<enriched.length;i++){
    for(let j=i+1;j<enriched.length;j++){
      for(let k=j+1;k<enriched.length;k++){
        for(let l=k+1;l<enriched.length;l++){
          for(let m=l+1;m<enriched.length;m++){

            let combo = [enriched[i], enriched[j], enriched[k], enriched[l], enriched[m]];
            let countries = new Set(
            combo.map(c=>c.country).filter(c=>c !== "unknown")
            );

            if(countries.size < combo.filter(c=>c.country !== "unknown").length) continue;

            let failProb = 1;
            combo.forEach(c=>{
              failProb *= (1 - c.prob);
            });

            let successProb = 1 - failProb;

            if(successProb > bestProb){
              bestProb = successProb;
              bestCombo = combo;
            }

          }
        }
      }
    }

function simulateBestOrder(universities){

  let bestOrder = [];
  let bestProb = 0;

  let list = universities.slice(0,5);

  function permute(arr, l){
    if(l === arr.length){
      evaluate(arr);
      return;
    }

    for(let i=l;i<arr.length;i++){
      [arr[l], arr[i]] = [arr[i], arr[l]];
      permute(arr, l+1);
      [arr[l], arr[i]] = [arr[i], arr[l]];
    }
  }

  function evaluate(order){

    let failProb = 1;

    order.forEach(u=>{
      let p = calculateProbability(u) / 100;
      failProb *= (1 - p);
    });

    let successProb = 1 - failProb;

    if(successProb > bestProb){
      bestProb = successProb;
      bestOrder = [...order];
    }
  }

  permute(list, 0);

  let html = `<b>최대 합격 확률: ${(bestProb*100).toFixed(1)}%</b><br><br>`;

  bestOrder.forEach((u,i)=>{
    html += `${i+1}지망: ${u.name}<br>`;
  });

  document.getElementById("simulationBox").innerHTML = html;
}  

function weightedPick(arr, weights){
  let r = Math.random();
  let sum = 0;

  for(let i=0;i<weights.length;i++){
    sum += weights[i];
    if(r < sum) return arr[i];
  }

  return arr[arr.length-1];
}

function pickUniversity(sorted, strategy){

  if(strategy === "safe"){
    return weightedPick(sorted, [0.4,0.25,0.2,0.1,0.05]);
  }

  if(strategy === "challenge"){
    let reversed = [...sorted].reverse();
    return weightedPick(reversed, [0.4,0.25,0.2,0.1,0.05]);
  }

  // balanced
  return weightedPick(sorted, [0.2,0.3,0.3,0.1,0.1]);
}

function simulateWithStrategy(userStrategy){

  let iterations = 400;
  let results = {};

  for(let t=0;t<iterations;t++){

    let finalResult = "미선발";

    for(let round=0; round<3; round++){

      let universities = {};
      let applicants = [];

      statusData.forEach(u=>{
        universities[u.name] = {
          capacity: Math.max(1, Number(u.seats) || 1),
          accepted: []
        };
      });

      // 🔥 지원자 생성
      statusData.forEach(u=>{
        let count = Number(u.applicants) || 0;

        for(let i=0;i<count;i++){

          let scores = (u.score_distribution || "")
            .split(",")
            .map(Number)
            .filter(x => !isNaN(x));

          let score = scores.length
            ? scores[Math.floor(Math.random() * scores.length)]
            : myScore + (Math.random() - 0.5);

          let rand = Math.random();
          let strategy = rand < 0.3 ? "safe" : rand < 0.6 ? "balanced" : "challenge";

          let sorted = statusData.slice().sort((a,b)=>{
            let pa = calculateProbability(a);
            let pb = calculateProbability(b);

            if(strategy === "safe") return pb - pa;
            if(strategy === "challenge") return pa - pb;
            return Math.abs(50 - pa) - Math.abs(50 - pb);
          });

          let choices = [];
          for(let c=0;c<5;c++){
            let picked = pickUniversity(sorted, strategy);
            if(!choices.includes(picked.name)){
              choices.push(picked.name);
            }
          }

          applicants.push({ score, choices });
        }
      });

      // ⭐ 내 전략 적용
      let sortedMine = statusData.slice().sort((a,b)=>{
        let pa = calculateProbability(a);
        let pb = calculateProbability(b);

        if(userStrategy === "safe") return pb - pa;
        if(userStrategy === "challenge") return pa - pb;
        return Math.abs(50 - pa) - Math.abs(50 - pb);
      });

      let myChoices = sortedMine.slice(0,5).map(u=>u.name);

      applicants.push({
        score: myScore,
        choices: myChoices,
        me: true
      });

      // 배정
      applicants.sort((a,b)=>b.score - a.score);

      applicants.forEach(a=>{
        for(let uni of a.choices){
          if(universities[uni] && universities[uni].accepted.length < universities[uni].capacity){
            universities[uni].accepted.push(a);
            break;
          }
        }
      });

      let result = "미선발";
      for(let uni in universities){
        if(universities[uni].accepted.find(a=>a.me)){
          result = uni;
          break;
        }
      }

      finalResult = result;
    }

    results[finalResult] = (results[finalResult] || 0) + 1;
  }

  return 100 * (1 - (results["미선발"] || 0) / iterations);
}

function calculatePredictedRange(university){

  let base = calculateDynamicCutoff(university);
  if(isNaN(base)) base = myScore;

  let applicants = Number(university.applicants) || 1;
  let seats = Number(university.seats) || 1;

  let competition = applicants / seats;

  // 🔥 변동성 (경쟁률 기반)
  let volatility = Math.log(competition + 1) * 0.8;

  // 🔥 상승 압력
  let pressure = (competition - 1) * 0.5;

  // 🔥 범위 계산
  let min = base + pressure - volatility;
  let max = base + pressure + volatility;

  return {
    min: Number(min.toFixed(2)),
    max: Number(max.toFixed(2))
  };
}

function calculateDynamicCutoff(u){
  let base = parseFloat(u.cutoff);
  if(isNaN(base)) base = myScore;

  let applicants = Number(u.applicants) || 1;
  let seats = Number(u.seats) || 1;

  let scores = (u.score_distribution || "")
    .split(",")
    .map(Number)
    .filter(x => !isNaN(x))
    .sort((a,b)=>b-a);

  if(scores.length === 0) return base;

  let competition = applicants / seats;
  let pressure_comp = Math.log(competition + 1);

  let topN = scores.slice(0, seats * 2);
  let leaveCount = topN.filter(s => s > base + 1).length;
  let pressure_top = - (leaveCount / topN.length || 0);

  let mid = scores.slice(seats, seats * 3);
  let pressure_mid = mid.length / scores.length;

  let predicted =
    base +
    pressure_comp * 0.8 +
    pressure_mid * 0.5 +
    pressure_top * 1.2;

  return Number(predicted.toFixed(2));
}
