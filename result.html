<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>지원 결과</title>
</head>

<body>

<h2>내 지원 결과</h2>

<table border="1">

<thead>

<tr>
<th>대학</th>
<th>지망</th>
<th>총점</th>
<th>순위</th>
<th>결과</th>
</tr>

</thead>

<tbody id="resultTable"></tbody>

</table>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let userEmail=localStorage.getItem("userEmail");

if(!userEmail){

alert("로그인이 필요합니다");

window.location.href="index.html";

}

fetch(API_URL+"?action=myresults&email="+userEmail)

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("resultTable");

table.innerHTML="";

data.forEach(r=>{

let row=`
<tr>
<td>${r.university}</td>
<td>${r.choice_rank}</td>
<td>${r.total}</td>
<td>${r.rank}</td>
<td>${r.result}</td>
</tr>
`;

table.innerHTML+=row;

});

});

</script>

</body>
</html>
