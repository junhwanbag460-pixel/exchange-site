<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>교환학생 모의지원</title>
</head>

<body>

<h2>교환학생 모의지원</h2>

이름<br>
<input id="name"><br><br>

학점 (4.3 만점)<br>
<input id="gpa"><br><br>

어학 종류<br>
<select id="language">
<option value="TOEFL">TOEFL</option>
<option value="IELTS">IELTS</option>
<option value="기관TOEFL">기관TOEFL</option>
</select>

<br><br>

어학 점수<br>
<input id="lang_score">

<br><br>

1지망<br>
<select id="choice1"></select><br><br>

2지망<br>
<select id="choice2"></select><br><br>

3지망<br>
<select id="choice3"></select><br><br>

4지망<br>
<select id="choice4"></select><br><br>

5지망<br>
<select id="choice5"></select><br><br>

<button onclick="submitApplication()">지원 제출</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

fetch(API_URL + "?action=universities")
.then(res => res.json())
.then(data => {

let selects = [
"choice1",
"choice2",
"choice3",
"choice4",
"choice5"
];

selects.forEach(id => {

let select = document.getElementById(id);

data.forEach(u => {

let option = document.createElement("option");

option.value = u.name;
option.text = u.name;

select.appendChild(option);

});

});

});

function submitApplication(){

let data = {

email:"test@khu.ac.kr",

name:document.getElementById("name").value,

gpa:document.getElementById("gpa").value,

language:document.getElementById("language").value,

lang_score:document.getElementById("lang_score").value,

choice1:document.getElementById("choice1").value,
choice2:document.getElementById("choice2").value,
choice3:document.getElementById("choice3").value,
choice4:document.getElementById("choice4").value,
choice5:document.getElementById("choice5").value,

total:100

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})

.then(res => res.json())
.then(result => {

alert("지원이 제출되었습니다");

});

}

</script>

</body>
</html>
