<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>교환학생 모의지원</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body>

<h2>교환학생 모의지원</h2>

<div id="g_id_onload"
data-client_id="692455502517-52tj203gjltpj5qo1hsa4hfn706o1ogb.apps.googleusercontent.com"
data-context="signin"
data-ux_mode="popup"
data-hd="khu.ac.kr"
data-callback="handleCredentialResponse"
data-auto_prompt="false">
</div>

<div class="g_id_signin"
data-type="standard"
data-shape="rectangular"
data-theme="outline"
data-text="signin_with"
data-size="large">
</div>

<br>

이름<br>
<input id="name"><br><br>

학점 (4.3 만점)<br>
<input id="gpa"><br><br>

어학 종류<br>

<select id="language">
<option value="TOEFL">TOEFL</option>
<option value="IELTS">IELTS</option>
<option value="기관TOEFL">기관TOEFL</option>
</select>

<br><br>

어학 점수<br>
<input id="lang_score">

<br><br>

1지망<br>
<select id="choice1"></select><br><br>

2지망<br>
<select id="choice2"></select><br><br>

3지망<br>
<select id="choice3"></select><br><br>

4지망<br>
<select id="choice4"></select><br><br>

5지망<br>
<select id="choice5"></select><br><br>

<button onclick="submitApplication()">지원 제출</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let userEmail = localStorage.getItem("userEmail") || "";

function handleCredentialResponse(response){

const token = response.credential;

const payload = JSON.parse(
  decodeURIComponent(
    atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
  )
);

userEmail = payload.email;

localStorage.setItem("userEmail", userEmail);

console.log("login email:", userEmail);

if(!userEmail.endsWith("@khu.ac.kr")){

alert("경희대학교 이메일만 로그인 가능합니다");

localStorage.removeItem("userEmail");

location.reload();

}

}
  
fetch(API_URL + "?action=universities")
.then(res => res.json())
.then(data => {

let selects = ["choice1","choice2","choice3","choice4","choice5"];

selects.forEach(id => {

let select = document.getElementById(id);

// 미선택 옵션 추가
let empty = document.createElement("option");
empty.value = "";
empty.text = "미선택";
select.appendChild(empty);

data.forEach(u => {

let option = document.createElement("option");

option.value = u.name;
option.text = u.name;

select.appendChild(option);

});

});

});

function checkDuplicate(){

let list = [
document.getElementById("choice1").value,
document.getElementById("choice2").value,
document.getElementById("choice3").value,
document.getElementById("choice4").value,
document.getElementById("choice5").value
];

// 빈 값 제거
let filtered = list.filter(v => v !== "");

let set = new Set(filtered);

if(set.size != filtered.length){

alert("같은 대학을 여러 번 선택할 수 없습니다");

return false;

}

return true;

}

function calculateTotal(){

let gpa = parseFloat(document.getElementById("gpa").value);
let score = parseFloat(document.getElementById("lang_score").value);
let type = document.getElementById("language").value;

/* GPA 점수 */

let gpaScore = (gpa/4.3) * 50;

/* 환산표 */

const table = [
{inst:677,toefl:120,ielts:9},
{inst:673,toefl:120,ielts:null},
{inst:670,toefl:119,ielts:null},
{inst:667,toefl:118,ielts:null},
{inst:663,toefl:117,ielts:null},
{inst:657,toefl:116,ielts:null},
{inst:653,toefl:115,ielts:null},
{inst:650,toefl:114,ielts:null},
{inst:647,toefl:113,ielts:null},
{inst:643,toefl:112,ielts:8},
{inst:640,toefl:111,ielts:null},
{inst:637,toefl:110,ielts:null},
{inst:633,toefl:109,ielts:null},
{inst:630,toefl:108,ielts:null},
{inst:627,toefl:107,ielts:7.5},
{inst:623,toefl:106,ielts:null},
{inst:620,toefl:105,ielts:null},
{inst:617,toefl:104,ielts:null},
{inst:613,toefl:103,ielts:null},
{inst:610,toefl:102,ielts:null},
{inst:607,toefl:101,ielts:null},
{inst:603,toefl:100,ielts:null},
{inst:600,toefl:99,ielts:7},
{inst:597,toefl:98,ielts:null},
{inst:593,toefl:97,ielts:null},
{inst:590,toefl:96,ielts:null},
{inst:587,toefl:95,ielts:null},
{inst:587,toefl:94,ielts:null},
{inst:583,toefl:93,ielts:null},
{inst:580,toefl:92,ielts:6.5},
{inst:577,toefl:91,ielts:null},
{inst:577,toefl:90,ielts:null},
{inst:573,toefl:89,ielts:null},
{inst:570,toefl:88,ielts:null},
{inst:567,toefl:87,ielts:null},
{inst:567,toefl:86,ielts:null},
{inst:563,toefl:85,ielts:null},
{inst:563,toefl:84,ielts:null},
{inst:560,toefl:83,ielts:null},
{inst:557,toefl:82,ielts:null},
{inst:553,toefl:81,ielts:null},
{inst:550,toefl:80,ielts:6},
{inst:550,toefl:79,ielts:null},
{inst:547,toefl:78,ielts:null},
{inst:547,toefl:77,ielts:null},
{inst:543,toefl:76,ielts:null},
{inst:540,toefl:75,ielts:null},
{inst:537,toefl:74,ielts:null},
{inst:533,toefl:73,ielts:null},
{inst:533,toefl:72,ielts:null}
];

/* TOEFL 환산 */

let toefl = 0;

if(type == "TOEFL"){
    toefl = score;
}

if(type == "기관TOEFL"){
    for(let i=0;i<table.length;i++){
        if(score >= table[i].inst){
            toefl = table[i].toefl;
            break;
        }
    }
}

if(type == "IELTS"){
    for(let i=0;i<table.length;i++){
        if(table[i].ielts && score >= table[i].ielts){
            toefl = table[i].toefl;
            break;
        }
    }
}

/* 어학 점수 */

let langScore = (toefl/120)*40;

/* 총점 */

return gpaScore + langScore + 10;

}

if(!checkDuplicate()) return;

let url = API_URL + "?action=submit"
+ "&email=" + encodeURIComponent(userEmail)
+ "&name=" + encodeURIComponent(document.getElementById("name").value)
+ "&gpa=" + document.getElementById("gpa").value
+ "&language=" + document.getElementById("language").value
+ "&lang_score=" + document.getElementById("lang_score").value
+ "&total=" + calculateTotal()
+ "&choice1=" + encodeURIComponent(document.getElementById("choice1").value)
+ "&choice2=" + encodeURIComponent(document.getElementById("choice2").value)
+ "&choice3=" + encodeURIComponent(document.getElementById("choice3").value)
+ "&choice4=" + encodeURIComponent(document.getElementById("choice4").value)
+ "&choice5=" + encodeURIComponent(document.getElementById("choice5").value);

window.location.href = url;

}

</script>

</body>
</html>
