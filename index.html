<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>교환학생 모의지원</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- ⭐ 여기 추가 -->
<style>

  margin-bottom: 20px;
}

.label {
  font-weight: bold;
}

.choice-block input {
  display: block;
  margin: 5px auto;

<style>
.choice-block {
  margin-bottom: 20px;
}

.label {
  font-weight: bold;
}

.choice-block input {
  display: block;
  margin: 5px auto;
  width: 250px;
}

.choice-block select {
  display: block;
  margin: 5px auto;
  width: 350px;
}

/* ⭐ 여기부터 추가 */
.suggest-box {
  border: 1px solid #ccc;
  max-height: 150px;
  overflow-y: auto;
  width: 350px;
  margin: 0 auto;
  background: white;
}

.suggest-item {
  padding: 5px;
  cursor: pointer;
}

.suggest-item:hover {
  background: #eee;

</head>

<body>

<h2>교환학생 모의지원</h2>

<p style="color:red;font-weight:bold">
⚠️ 별명, 학점, 어학종류, 어학점수는 처음 제출 후 수정할 수 없습니다.
</p>

<div id="g_id_onload"
data-client_id="692455502517-52tj203gjltpj5qo1hsa4hfn706o1ogb.apps.googleusercontent.com"
data-context="signin"
data-ux_mode="popup"
data-hd="khu.ac.kr"
data-callback="handleCredentialResponse"
data-auto_prompt="false">
</div>

<div style="display:flex; justify-content:center;">
    <div class="g_id_signin"
        data-type="standard"
        data-shape="rectangular"
        data-theme="outline"
        data-text="signin_with"
        data-size="large">
    </div>
</div>

<br>

별명<br>
<input id="nickname"><br><br>

학점 (4.3 만점)<br>
<input id="gpa" type="number" step="0.01" min="0" max="4.3"><br><br>

어학 종류<br>

<select id="language">
<option value="TOEFL">토플</option>
<option value="IELTS">아이엘츠</option>
<option value="INST">ITP (기관토플)</option>
</select>

<br><br>

어학 점수<br>
<input id="lang_score" type="number" step="0.1">

<br><br>

<div id="detailScores"></div>
  
<div class="choice-block">
  <div class="label">1지망</div>
  <input id="search1" placeholder="대학 검색">
<div id="suggest1" class="suggest-box"></div>
<select id="choice1"></select>
</div>

<div class="choice-block">
  <div class="label">2지망</div>
  <input id="search2" placeholder="대학 검색">
<div id="suggest2" class="suggest-box"></div>
<select id="choice2"></select>
</div>

<div class="choice-block">
  <div class="label">3지망</div>
  <input id="search3" placeholder="대학 검색">
<div id="suggest3" class="suggest-box"></div>
<select id="choice3"></select>
</div>

<div class="choice-block">
  <div class="label">4지망</div>
  <input id="search4" placeholder="대학 검색">
<div id="suggest4" class="suggest-box"></div>
<select id="choice4"></select>
</div>

<div class="choice-block">
  <div class="label">5지망</div>
  <input id="search5" placeholder="대학 검색">
<div id="suggest5" class="suggest-box"></div>
<select id="choice5"></select>
</div>

<button onclick="submitApplication()">지원 제출</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

/* ⭐⭐⭐ 여기 추가 ⭐⭐⭐ */
function ById(id){
  return document.getElementById(id);
}

let userEmail = "";

function handleCredentialResponse(response){

const token = response.credential;

const payload = JSON.parse(
  decodeURIComponent(
    atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
  )
);

userEmail = payload.email;

if(!userEmail.endsWith("@khu.ac.kr")){
    alert("경희대학교 이메일만 로그인 가능합니다");
    return;
}

localStorage.setItem("userEmail", userEmail); // ⭐ 여기로 이동

console.log("login email:", userEmail);

enableInputs();   // ⭐ 추가
loadStudentData().then(() => {
  loadUniversities();
});

}
  
let universityList=[];

// ⭐ 여기 추가 (fetch 위)
function getFilteredUniversities(){

let selectedLang = document.getElementById("language").value || "TOEFL";

// ⭐ 핵심 추가
if(selectedLang === "INST") selectedLang = "기관TOEFL";
let score = parseFloat(document.getElementById("lang_score").value);

return universityList.filter(u => {

  // 점수 없으면 어학 종류만 필터
  if(isNaN(score)) {
  // 점수 없을 때는 "어학 종류만" 필터
  if(u.language_requirement){
    let allowed = u.language_requirement.split(",").map(v => v.trim());
    return allowed.includes(selectedLang);
  }
  return true;
}

  // 1️⃣ 어학 종류
  if(u.language_requirement){
    let allowed = u.language_requirement.split(",").map(v => v.trim());
    if(!allowed.includes(selectedLang)) return false;
  }

  // 2️⃣ 점수
  if(selectedLang === "TOEFL" && u.min_toefl){
    if(score < u.min_toefl) return false;
  }

  if(selectedLang === "IELTS" && u.min_ielts){
    if(score < u.min_ielts) return false;
  }

  if(selectedLang === "INST" && u.min_inst){
    if(score < u.min_inst) return false;
  }

  return true;

});
}

function renderDetailInputs(){

let type = ById("language").value;
let container = ById("detailScores");

container.innerHTML = "";

let levels = ["A1","A2","B1","B2","C1"];

function createSelect(id, label){
let html = label + "<br><select id='"+id+"'>";
levels.forEach(l=>{
html += "<option value='"+l+"'>"+l+"</option>";
});
html += "</select><br><br>";
return html;
}

// TOEFL / IELTS
if(type === "TOEFL" || type === "IELTS"){

container.innerHTML += createSelect("listening","리스닝");
container.innerHTML += createSelect("reading","리딩");
container.innerHTML += createSelect("speaking","스피킹");
container.innerHTML += createSelect("writing","라이팅");

}

// 기관TOEFL
if(type === "INST"){

container.innerHTML += createSelect("listening","리스닝");
container.innerHTML += createSelect("reading","리딩");
container.innerHTML += createSelect("grammar","문법");

}

}

// ⭐ 여기 추가 (fetch 끝나고 바로 밑)
ById("language").addEventListener("change", () => {
renderUniversities(getFilteredUniversities());
renderDetailInputs(); // ⭐ 추가
});

ById("lang_score").addEventListener("input", () => {
  renderUniversities(getFilteredUniversities());
});  

function renderUniversities(data){

let selected = {
choice1: window.savedChoices?.choice1 || "",
choice2: window.savedChoices?.choice2 || "",
choice3: window.savedChoices?.choice3 || "",
choice4: window.savedChoices?.choice4 || "",
choice5: window.savedChoices?.choice5 || ""
};;

let selects=["choice1","choice2","choice3","choice4","choice5"];

selects.forEach((id, idx)=>{

let searchValue = document.getElementById("search"+(idx+1))?.value?.toLowerCase() || "";

let filteredData = data.filter(u =>
  u.name.toLowerCase().includes(searchValue)
);

let select=document.getElementById(id);

select.innerHTML="";

let empty=document.createElement("option");
empty.value="";
empty.text="미선택";
select.appendChild(empty);

filteredData.forEach(u=>{

let option=document.createElement("option");

option.value=u.name;
option.text=u.name;

let score = parseFloat(document.getElementById("lang_score").value);
let lang = document.getElementById("language").value;

if(lang === "INST") lang = "기관TOEFL";

let blocked = false;

if(u.language_requirement){
  let allowed = u.language_requirement.split(",").map(v => v.trim());
  if(!allowed.includes(lang)) blocked = true;
}

if(!isNaN(score)){
  if(lang === "TOEFL" && u.min_toefl && score < u.min_toefl) blocked = true;
  if(lang === "IELTS" && u.min_ielts && score < u.min_ielts) blocked = true;
  if(lang === "INST" && u.min_inst && score < u.min_inst) blocked = true;
}

if(blocked){
  option.disabled = true;
  option.text += " (조건 미달)";
}

if(selected[id] === u.name){
  option.selected = true;
}

select.appendChild(option);

});

});
}

function checkDuplicate(){

let list = [
document.getElementById("choice1").value,
document.getElementById("choice2").value,
document.getElementById("choice3").value,
document.getElementById("choice4").value,
document.getElementById("choice5").value
];

// 빈 값 제거
let filtered = list.filter(v => v !== "");

let set = new Set(filtered);

if(set.size != filtered.length){

alert("같은 대학을 여러 번 선택할 수 없습니다");

return false;

}

return true;

}

function calculateTotal(){

let gpa = parseFloat(document.getElementById("gpa").value);
let score = parseFloat(document.getElementById("lang_score").value);
let type = document.getElementById("language").value;

/* GPA 점수 */

let gpaScore = (gpa/4.3) * 50;

/* 환산표 */

const table = [
{inst:677,toefl:120,ielts:9},
{inst:673,toefl:120,ielts:null},
{inst:670,toefl:119,ielts:null},
{inst:667,toefl:118,ielts:null},
{inst:663,toefl:117,ielts:null},
{inst:657,toefl:116,ielts:null},
{inst:653,toefl:115,ielts:null},
{inst:650,toefl:114,ielts:null},
{inst:647,toefl:113,ielts:null},
{inst:643,toefl:112,ielts:8},
{inst:640,toefl:111,ielts:null},
{inst:637,toefl:110,ielts:null},
{inst:633,toefl:109,ielts:null},
{inst:630,toefl:108,ielts:null},
{inst:627,toefl:107,ielts:7.5},
{inst:623,toefl:106,ielts:null},
{inst:620,toefl:105,ielts:null},
{inst:617,toefl:104,ielts:null},
{inst:613,toefl:103,ielts:null},
{inst:610,toefl:102,ielts:null},
{inst:607,toefl:101,ielts:null},
{inst:603,toefl:100,ielts:null},
{inst:600,toefl:99,ielts:7},
{inst:597,toefl:98,ielts:null},
{inst:593,toefl:97,ielts:null},
{inst:590,toefl:96,ielts:null},
{inst:587,toefl:95,ielts:null},
{inst:587,toefl:94,ielts:null},
{inst:583,toefl:93,ielts:null},
{inst:580,toefl:92,ielts:6.5},
{inst:577,toefl:91,ielts:null},
{inst:577,toefl:90,ielts:null},
{inst:573,toefl:89,ielts:null},
{inst:570,toefl:88,ielts:null},
{inst:567,toefl:87,ielts:null},
{inst:567,toefl:86,ielts:null},
{inst:563,toefl:85,ielts:null},
{inst:563,toefl:84,ielts:null},
{inst:560,toefl:83,ielts:null},
{inst:557,toefl:82,ielts:null},
{inst:553,toefl:81,ielts:null},
{inst:550,toefl:80,ielts:6},
{inst:550,toefl:79,ielts:null},
{inst:547,toefl:78,ielts:null},
{inst:547,toefl:77,ielts:null},
{inst:543,toefl:76,ielts:null},
{inst:540,toefl:75,ielts:null},
{inst:537,toefl:74,ielts:null},
{inst:533,toefl:73,ielts:null},
{inst:533,toefl:72,ielts:null}
];

/* TOEFL 환산 */

let toefl = 0;

if(type == "TOEFL"){
    toefl = score;
}

if(type === "INST"){
    for(let i=0;i<table.length;i++){
        if(score >= table[i].inst){
            toefl = table[i].toefl;
            break;   // ⭐ 핵심
        }
    }
}

if(type == "IELTS"){
    for(let i=0;i<table.length;i++){
        if(table[i].ielts !== null && score >= table[i].ielts){
            toefl = table[i].toefl;
            break;   // ⭐ 추가
        }
    }
}

/* 어학 점수 */

let langScore = (toefl/120)*40;

/* 총점 */

return gpaScore + langScore + 10;

}

function submitApplication(){

let btn = document.querySelector("button");
btn.disabled = true;  

if(!userEmail || !localStorage.getItem("userEmail")){
    alert("먼저 Google 로그인을 해주세요");
    btn.disabled = false;
    return;
}

let nickname = document.getElementById("nickname").value.trim();

if(nickname === ""){
alert("별명을 입력하세요");
btn.disabled = false;
return;
}

/* 점수 입력 검사 */
let gpa = parseFloat(document.getElementById("gpa").value);
let score = parseFloat(document.getElementById("lang_score").value);

if(isNaN(gpa) || gpa < 0 || gpa > 4.3){
alert("GPA는 0~4.3 사이로 입력하세요");
btn.disabled = false;
return;
}

if(isNaN(score)){
alert("어학 점수를 입력하세요");
btn.disabled = false;
return;
}

if(!checkDuplicate()){
btn.disabled = false;
return;
}

let language = document.getElementById("language").value;

// ⭐ 이거 추가 (핵심)
if(language === "INST") language = "기관TOEFL";    

let url = API_URL + "?action=submit"
+ "&email=" + encodeURIComponent(userEmail)
+ "&nickname=" + encodeURIComponent(document.getElementById("nickname").value)
+ "&gpa=" + document.getElementById("gpa").value
+ "&language=" + language
+ "&lang_score=" + Number(document.getElementById("lang_score").value)
+ "&total=" + calculateTotal()
+ "&choice1=" + encodeURIComponent(document.getElementById("choice1").value)
+ "&choice2=" + encodeURIComponent(document.getElementById("choice2").value)
+ "&choice3=" + encodeURIComponent(document.getElementById("choice3").value)
+ "&choice4=" + encodeURIComponent(document.getElementById("choice4").value)
+ "&choice5=" + encodeURIComponent(document.getElementById("choice5").value)
+ "&listening=" + (document.getElementById("listening")?.value || "")
+ "&reading=" + (document.getElementById("reading")?.value || "")
+ "&speaking=" + (document.getElementById("speaking")?.value || "")
+ "&writing=" + (document.getElementById("writing")?.value || "")
+ "&grammar=" + (document.getElementById("grammar")?.value || "")

fetch(url)
.then(res => res.text())
.then(text => {

    if(text !== "success"){
        alert(text);          // 서버 에러 그대로 보여줌
        btn.disabled = false;
        return;
    }

  window.location.href = "result.html";

})
.catch(() => {
    alert("제출 중 오류 발생");
    btn.disabled = false;
});

}

function loadUniversities(){

fetch(API_URL + "?action=universities")
.then(res => res.json())
.then(data => {

  universityList = data;

renderDetailInputs();
renderUniversities(getFilteredUniversities());

// ⭐ 이 줄 추가 (핵심)
if(window.savedChoices){
  lockInputs();
}

});
}

function lockInputs(){
  document.getElementById("nickname").disabled = true;
  document.getElementById("gpa").disabled = true;
  document.getElementById("language").disabled = true;
  document.getElementById("lang_score").disabled = true;

  // ⭐ 세부 성적도 잠금
  ["listening","reading","speaking","writing","grammar"].forEach(id=>{
    let el = document.getElementById(id);
    if(el) el.disabled = true;
  });
}

function loadStudentData(){
  return fetch(API_URL+"?action=student&email="+userEmail)

.then(res=>res.json())

.then(data=>{

if(!data || !data.choice1){
  window.savedChoices = null;
  return;
}

if(data && data.choice1){

document.getElementById("nickname").value = data.nickname;
document.getElementById("gpa").value = data.gpa;
let lang = data.language;

// ⭐ 기존 데이터 보정 (핵심)
if(lang === "기관TOEFL") lang = "INST";

document.getElementById("language").value = lang;
renderDetailInputs();
document.getElementById("lang_score").value = data.lang_score;

// ⭐ 이 줄 추가 (핵심)
lockInputs();

// ⭐ 이것만 남김 (핵심)
window.savedChoices = {
  choice1: data.choice1,
  choice2: data.choice2,
  choice3: data.choice3,
  choice4: data.choice4,
  choice5: data.choice5
};

lockInputs();

document.querySelector("button").innerText = "지망 수정 제출";

return;
}

});

}

// ⭐ 로그인 유지 복구
renderDetailInputs();   // ⭐ 이거 추가 (초기 렌더 강제)

function disableAllInputs(){
  document.querySelectorAll("input, select")
  .forEach(el => el.disabled = true);

  // 로그인 버튼만 클릭 가능
  document.querySelector(".g_id_signin").style.pointerEvents = "auto";
} 

function enableInputs(){
document.querySelectorAll("input, select")
.forEach(el => el.disabled = false);

// ⭐ 추가 (핵심)
if(!ById("language").value){
  ById("language").value = "TOEFL";
}

renderDetailInputs();

// ⭐ 추가 (이미 제출된 사용자면 다시 잠금)
if(window.savedChoices){
  lockInputs();
}
}

disableAllInputs();   // ⭐ 이 줄 추가    

// ⭐⭐⭐ 로그인 유지 복구 (핵심) ⭐⭐⭐
const savedEmail = localStorage.getItem("userEmail");

if(savedEmail && savedEmail.endsWith("@khu.ac.kr")){
  userEmail = savedEmail;

  enableInputs();

  // ❗ 핵심: 데이터는 불러오지 않음
  loadUniversities();
}

// ⭐ 검색 입력 시 실시간 반영
for(let i=1;i<=5;i++){

  let input = document.getElementById("search"+i);
  let box = document.getElementById("suggest"+i);

  if(input){

    input.addEventListener("input", ()=>{

      // select 필터 유지
      renderUniversities(getFilteredUniversities());

      let value = input.value.toLowerCase();

      let filtered = universityList.filter(u =>
        u.name.toLowerCase().includes(value)
      );

      box.innerHTML = "";

      filtered.slice(0,10).forEach(u=>{

        let div = document.createElement("div");
        div.className = "suggest-item";
        div.innerText = u.name;

        div.onclick = ()=>{
          document.getElementById("choice"+i).value = u.name;
          input.value = u.name;
          box.innerHTML = "";
        };

        box.appendChild(div);
      });

    });

  }
}
  
</script>

<body style="
text-align:center;
font-family:sans-serif;
">
</html>
