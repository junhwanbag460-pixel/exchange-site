<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>전체 대학 지원 현황</title>
</head>

<body>

<h2>전체 대학 지원 현황</h2>

검색
<input type="text" id="searchBox" placeholder="대학 이름 또는 국가 검색">
<br><br>

<table border="1">
<thead>
<tr>
<th>대학</th>
<th>국가</th>
<th>정원</th>
<th>지원자</th>
<th>경쟁률</th>
</tr>
</thead>

<tbody id="statusTable"></tbody>
</table>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

fetch(API_URL+"?action=status")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("statusTable");

table.innerHTML="";

data.forEach(u=>{

let row=document.createElement("tr");

row.innerHTML=`
<td class="uni">${u.name}</td>
<td class="country">${u.country}</td>
<td>${u.seats}</td>
<td>${u.applicants}</td>
<td>${u.rate}</td>
`;

table.appendChild(row);

});

});

/* 검색 기능 */

document.getElementById("searchBox").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase().trim();

let rows=document.querySelectorAll("#statusTable tr");

rows.forEach(row=>{

let uni=row.querySelector(".uni")?.innerText.toLowerCase() || "";
let country=row.querySelector(".country")?.innerText.toLowerCase() || "";

if(uni.includes(keyword) || country.includes(keyword)){
row.style.display="";
}else{
row.style.display="none";
}

});

});
  
</script>

</body>
</html>
