<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>전체 대학 지원 현황</title>
</head>

<body style="
text-align:center;
font-family:sans-serif;
">

<h2>전체 대학 지원 현황</h2>

정렬
<button onclick="sortTable('rate')">경쟁률순</button>
<button onclick="sortTable('cutoff')">컷라인순</button>
<button onclick="sortTable('firstChoice')">1지망순</button>
<button onclick="sortTable('seats')">정원순</button>
<br><br>

검색
<input type="text" id="searchBox" placeholder="대학 이름 또는 국가 검색">
<br><br>

<div id="cardContainer" style="
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";
function round2(num){
  return Math.round(num * 100) / 100;
}  

let universityData=[];
let currentSort="";

let realStudents = []; // ⭐ 이거 추가
let chart;

let rawScore = localStorage.getItem("myScore");
let myScore = rawScore ? round2(Number(rawScore)) : 0;

function loadStatus(){

fetch(API_URL+"?action=status")
.then(res=>res.json())
.then(data=>{

universityData = data;
renderCards();;

});
}
/* 검색 기능 */

document.getElementById("searchBox").addEventListener("keyup", function(){
  renderCards();
});

function loadStudents(){
  fetch(API_URL + "?action=students")
    .then(res => res.json())
    .then(data => {
      realStudents = data;
      loadStatus(); // ⭐ 학생 불러온 후 상태 로드
    });
}  

function sortTable(type){

currentSort = type;

universityData.sort((a,b)=>{

let A = a[type];
let B = b[type];

if(type==="rate"){
A = parseFloat(String(A).split(":")[0]) || 0;
B = parseFloat(String(B).split(":")[0]) || 0;
}

else if(type==="cutoff"){
A = parseFloat(A);
B = parseFloat(B);

if(isNaN(A)) A = -1;
if(isNaN(B)) B = -1;
}

else{
A = Number(A) || 0;
B = Number(B) || 0;
}

return B - A;

});

// ⭐ 핵심: 다시 카드 렌더링
renderCards();

}

let assignedUniversity = "";
let userEmail = localStorage.getItem("userEmail");

function loadMyResult(){

  if(!userEmail){
    alert("로그인이 필요합니다");
    location.href="index.html";
    return;
  }

 fetch(API_URL + "?action=myresults&email=" + userEmail)
.then(res => {
  if(!res.ok) throw new Error("myresults 실패");
  return res.json();
})
.then(data=>{

  // ⭐⭐⭐ 추가
if(data.length > 0){
  myBaseInfo = {
    language: data[0].language,
    lang_score: Number(data[0].lang_score)
  };
}

  let assigned = data.find(r => r.result === "합격");

  if(assigned){
    assignedUniversity = assigned.university;
  } else {
    assignedUniversity = "";
  }

  loadStudents();

})
.catch(err=>{
  console.error("myresults 에러:", err);

  // ⭐ 핵심: 실패해도 강제로 다음 실행
  loadStudents();
});

}
  
loadMyResult();
// setInterval(loadStatus,5000); ← 주석 처리
  
</script>

<!-- ⭐ 여기 붙여 -->
<div id="modal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
z-index:9999;
">

<div style="
background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:10px;
">

<h3 id="modalTitle"></h3>

<br>
<button onclick="closeModal()">닫기</button>

</div>
</div>

<script>
  
function openModal(u){

  // ⭐ 지원 가능 여부
let canApply = true;

if(typeof myBaseInfo !== "undefined"){

  if(myBaseInfo.language === "TOEFL"){
  if(!u.min_toefl || myBaseInfo.lang_score < u.min_toefl){
    canApply = false;
  }
}
else if(myBaseInfo.language === "IELTS"){
  if(!u.min_ielts || myBaseInfo.lang_score < u.min_ielts){
    canApply = false;
  }
}
else if(myBaseInfo.language === "INST"){
  if(!u.min_inst || myBaseInfo.lang_score < u.min_inst){
    canApply = false;
  }
}

}

  document.getElementById("modal").style.display="block";

  let result = (assignedUniversity === u.name);

  let status = result ? "🟢 합격" : "🔴 탈락";
  let color = result ? "green" : "red";

  // ⭐ 먼저 계산
let cutoff = parseFloat(u.cutoff);

if(isNaN(cutoff)){
  cutoff = null;
}else{
  cutoff = round2(cutoff);
}

let gap = (cutoff !== null) ? round2(myScore - cutoff) : null;

if(!canApply){
  gap = null;
}

  let gapText = "";
  let gapColor = "#999";

  // ⭐ 지원 유형 판단
let s = getStrategy(gap);
let strategy = s.text;
let strategyColor = s.color;

  if(gap !== null){
    if(gap >= 1){
      gapText = `+${gap.toFixed(2)} (안정)`;
      gapColor = "green";
    } else if(gap >= -1){
      gapText = `${gap.toFixed(2)} (경계)`;
      gapColor = "orange";
    } else {
      gapText = `${gap.toFixed(2)} (위험)`;
      gapColor = "red";
    }
  }

  // ⭐ 그 다음 UI
  document.getElementById("modalTitle").innerHTML =
  u.name + " (" + u.country + ")" +
  "<br>내 점수: " + myScore +
"<br>컷라인: " + (u.cutoff ? round2(parseFloat(u.cutoff)).toFixed(2) : "-") +
  "<br>점수차: <span style='color:"+gapColor+"'>" + (gap !== null ? gapText : "데이터 없음") + "</span>" +
"<br>지원전략: <span style='color:"+(canApply ? strategyColor : "gray")+"'>" + 
(canApply ? (strategy + " 지원") : "데이터 없음") +
"</span>" +
"<br>지원자: " + u.applicants +
  "<br>정원: " + u.seats;

}

// ⭐ 지원 전략 계산 함수 (중복 제거용)
function getStrategy(gap){

  if(gap === null){
    return {text:"", color:"#666"};
  }

  if(gap >= 3){
    return {text:"상향", color:"blue"};
  }

  if(gap >= 0){
    return {text:"적정", color:"green"};
  }

  return {text:"하향", color:"red"};
}
  
function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderCards(){

  let container = document.getElementById("cardContainer");
  container.innerHTML = "";

  let keyword = document.getElementById("searchBox").value.toLowerCase().trim();

  let filtered = [...universityData];

  if(keyword !== ""){
    filtered = filtered.filter(u =>
      u.name.toLowerCase().includes(keyword) ||
      u.country.toLowerCase().includes(keyword)
    );
  }

  if(filtered.length === 0){
    container.innerHTML = "<div style='color:#999'>검색 결과 없음</div>";
    return;
  }

  filtered.forEach(u=>{

    // ⭐ 지원 가능 여부
let canApply = true;

// myBaseInfo 없으면 일단 통과 (에러 방지)
if(typeof myBaseInfo !== "undefined"){

  if(myBaseInfo.language === "TOEFL"){
  if(!u.min_toefl || myBaseInfo.lang_score < u.min_toefl){
    canApply = false;
  }
}
else if(myBaseInfo.language === "IELTS"){
  if(!u.min_ielts || myBaseInfo.lang_score < u.min_ielts){
    canApply = false;
  }
}
else if(myBaseInfo.language === "INST"){
  if(!u.min_inst || myBaseInfo.lang_score < u.min_inst){
    canApply = false;
  }
}

}

    // ⭐ 컷 대비 점수 차이 계산
let cutoff = parseFloat(u.cutoff);

// ⭐ cutoff 없으면 추정값 사용
if(isNaN(cutoff)){
  cutoff = null;  // 기본값 (최소한 계산 가능하게)
}else{
  cutoff = round2(cutoff);
}

let gap = (cutoff !== null) ? round2(myScore - cutoff) : null;

if(!canApply){
  gap = null;
}

let gapText = "";
let gapColor = "#999";

  // ⭐ 지원 유형 판단
let s = getStrategy(gap);
let strategy = s.text;
let strategyColor = s.color;

if(gap !== null){
  if(gap >= 1){
    gapText = `+${gap.toFixed(2)} (안정)`;
    gapColor = "green";
  } else if(gap >= -1){
    gapText = `${gap.toFixed(2)} (경계)`;
    gapColor = "orange";
  } else {
    gapText = `${gap.toFixed(2)} (위험)`;
    gapColor = "red";
  }
}
    
    let card = document.createElement("div");

    card.onclick = () => openModal(u);

    card.style = `
    width:220px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:12px;
    cursor:pointer;
    box-shadow:2px 2px 8px rgba(0,0,0,0.1);
    text-align:center;
    `;

    card.innerHTML = `
<h4>${u.name}</h4>
<p>🌍 ${u.country}</p>
<p>👥 ${u.applicants} / ${u.seats}</p>
<p>🔥 경쟁률: ${u.rate}</p>
<p>📉 컷라인: ${u.cutoff || "-"}</p>

<p style="font-weight:bold;color:${gapColor}">
📊 ${gap !== null ? gapText : "데이터 없음"}
</p>

<p style="font-weight:bold;color:${canApply ? strategyColor : "gray"}">
📌 ${canApply ? (strategy + " 지원") : "데이터 없음"}
</p>

`;

    container.appendChild(card);

  });
}

</script>

</body>
</html>
