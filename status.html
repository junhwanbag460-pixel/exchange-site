<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>전체 대학 지원 현황</title>
</head>

<body style="
text-align:center;
font-family:sans-serif;
">

<h2>전체 대학 지원 현황</h2>

정렬
<button onclick="sortTable('rate')">경쟁률순</button>
<button onclick="sortTable('cutoff')">컷라인순</button>
<button onclick="sortTable('firstChoice')">1지망순</button>
<button onclick="sortTable('seats')">정원순</button>
<br><br>

검색
<input type="text" id="searchBox" placeholder="대학 이름 또는 국가 검색">
<br><br>

<div id="cardContainer" style="
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
">

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let universityData=[];
let currentSort="";

let chart;

let rawScore = localStorage.getItem("myScore");
let myScore = rawScore ? Number(Number(rawScore).toFixed(2)) : 0;

function loadStatus(){

fetch(API_URL+"?action=status")
.then(res=>res.json())
.then(data=>{

universityData = data;
renderCards();

});
}
/* 검색 기능 */

document.getElementById("searchBox").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase().trim();

let cards=document.querySelectorAll("#cardContainer > div");

cards.forEach(card=>{

let text = card.innerText.toLowerCase();

if(text.includes(keyword)){
card.style.display="";
}else{
card.style.display="none";
}

});

});

function sortTable(type){

currentSort = type;

universityData.sort((a,b)=>{

let A = a[type];
let B = b[type];

if(type==="rate"){
A = parseFloat(String(A).split(":")[0]) || 0;
B = parseFloat(String(B).split(":")[0]) || 0;
}

else if(type==="cutoff"){
A = parseFloat(A);
B = parseFloat(B);

if(isNaN(A)) A = -1;
if(isNaN(B)) B = -1;
}

else{
A = Number(A) || 0;
B = Number(B) || 0;
}

return B - A;

});

// ⭐ 핵심: 다시 카드 렌더링
renderCards();

}

function calculateProbability(cutoff, applicants, seats){

if(applicants === 0 || seats === 0) return 0;

// ⭐ 1. 공급 > 수요 → 거의 확정
if(applicants <= seats){
  return 98;
}

// ⭐ 2. 점수 차이
let diff = myScore - cutoff;

// ⭐ 3. 로지스틱 함수
let k = 0.8;  // 민감도 (중요)

let prob = 1 / (1 + Math.exp(-k * diff));

// ⭐ 4. 경쟁률 반영
let rate = applicants / seats;
prob = prob * (1 - (rate - 1) * 0.08);

// ⭐ 5. % 변환
prob = prob * 100;

// ⭐ 6. 범위 제한
if(prob > 95) prob = 95;
if(prob < 10) prob = 10;

return Math.round(prob);
}
  
loadStatus();
// setInterval(loadStatus,5000); ← 주석 처리
  
</script>

<!-- ⭐ 여기 붙여 -->
<div id="modal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
">

<div style="
background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:10px;
">

<h3 id="modalTitle"></h3>

<br>
<button onclick="closeModal()">닫기</button>

</div>
</div>

<script>
  
function openModal(u){

document.getElementById("modal").style.display="block";

// 컷라인 정리
let cutoff = parseFloat(u.cutoff);

if(isNaN(cutoff)){
  cutoff = myScore;  // ⭐ 핵심 (중립값)
}

cutoff = Number(cutoff.toFixed(2));

// 확률 계산
let prob = calculateProbability(cutoff, u.applicants, u.seats);

// 상태 판단
let status = "";
let color = "black";

if(prob >= 80){
  status = "🟢 안정";
  color = "green";
}
else if(prob >= 50){
  status = "🟡 적정";
  color = "orange";
}
else{
  status = "🔴 위험";
  color = "red";
}

// 모달 내용 출력
document.getElementById("modalTitle").innerHTML =
u.name + " (" + u.country + ")" +
"<br>합격 확률: <span style='color:"+color+"'>" + prob + "%</span>" +
"<br>상태: " + status +
"<br>내 점수: " + myScore +
"<br>컷라인: " + cutoff +
"<br>지원자: " + u.applicants +
"<br>정원: " + u.seats +
"<br><small style='color:gray'>* 이 확률은 참고용이며 실제 결과와 다를 수 있습니다</small>";

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderCards(){

let container = document.getElementById("cardContainer");
container.innerHTML = "";

universityData.forEach(u=>{

let card = document.createElement("div");

// ⭐ 여기 추가
let cutoff = parseFloat(u.cutoff);

if(isNaN(cutoff)){
  cutoff = "-";
}else{
  cutoff = cutoff.toFixed(2);
}

card.style = `
width:220px;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
cursor:pointer;
box-shadow:2px 2px 8px rgba(0,0,0,0.1);
text-align:left;
`;

card.innerHTML = `
<h4>${u.name}</h4>
<p>🌍 ${u.country}</p>
<p>👥 ${u.applicants} / ${u.seats}</p>
<p>🔥 경쟁률: ${u.rate}</p>
<p>📈 컷라인: ${cutoff}</p>
`;

card.onclick = () => openModal(u);

container.appendChild(card);

});

}
  
</script>

<body>
</html>
