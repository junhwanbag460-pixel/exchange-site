<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>전체 대학 지원 현황</title>
</head>

<body style="
text-align:center;
font-family:sans-serif;
">

<h2>전체 대학 지원 현황</h2>

정렬
<button onclick="sortTable('rate')">경쟁률순</button>
<button onclick="sortTable('cutoff')">컷라인순</button>
<button onclick="sortTable('firstChoice')">1지망순</button>
<button onclick="sortTable('seats')">정원순</button>
<br><br>

검색
<input type="text" id="searchBox" placeholder="대학 이름 또는 국가 검색">
<br><br>

<div id="cardContainer" style="
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let universityData=[];
let currentSort="";

let chart;

let rawScore = localStorage.getItem("myScore");
let myScore = rawScore ? Number(Number(rawScore).toFixed(2)) : 0;

function loadStatus(){

fetch(API_URL+"?action=status")
.then(res=>res.json())
.then(data=>{

universityData = data;
renderCards();;

});
}
/* 검색 기능 */

document.getElementById("searchBox").addEventListener("keyup", function(){
  renderCards();
});

function sortTable(type){

currentSort = type;

universityData.sort((a,b)=>{

let A = a[type];
let B = b[type];

if(type==="rate"){
A = parseFloat(String(A).split(":")[0]) || 0;
B = parseFloat(String(B).split(":")[0]) || 0;
}

else if(type==="cutoff"){
A = parseFloat(A);
B = parseFloat(B);

if(isNaN(A)) A = -1;
if(isNaN(B)) B = -1;
}

else{
A = Number(A) || 0;
B = Number(B) || 0;
}

return B - A;

});

// ⭐ 핵심: 다시 카드 렌더링
renderCards();

}


  
loadStatus();
// setInterval(loadStatus,5000); ← 주석 처리
  
</script>

<!-- ⭐ 여기 붙여 -->
<div id="modal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
z-index:9999;
">

<div style="
background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:10px;
">

<h3 id="modalTitle"></h3>

<br>
<button onclick="closeModal()">닫기</button>

</div>
</div>

<script>
  
function openModal(u){

  document.getElementById("modal").style.display="block";

  let result = simulateAssignment(u.name);

  let status = result ? "🟢 합격" : "🔴 탈락";
  let color = result ? "green" : "red";

  document.getElementById("modalTitle").innerHTML =
  u.name + " (" + u.country + ")" +
  "<br>결과: <span style='color:"+color+"'>" + (result ? "합격" : "탈락") + "</span>" +
  "<br>내 점수: " + myScore +
  "<br>지원자: " + u.applicants +
  "<br>정원: " + u.seats;

}
function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderCards(){

let container = document.getElementById("cardContainer");
container.innerHTML = "";

let keyword = document.getElementById("searchBox").value.toLowerCase().trim();

let filtered = [...universityData];

// 🔥 검색어 없으면 전체 보여주기
if(keyword !== ""){
  filtered = filtered.filter(u =>
    u.name.toLowerCase().includes(keyword) ||
    u.country.toLowerCase().includes(keyword)
  );
}

// 🔥 데이터 없을 때만 메시지
if(filtered.length === 0){
  container.innerHTML = "<div style='color:#999'>검색 결과 없음</div>";
  return;
}
filtered.forEach(u=>{

let card = document.createElement("div");

card.onclick = () => openModal(u);

let result = simulateAssignment(u.name);

let color = result ? "green" : "red";

let cutoff = "-"; // 표시용
  
card.style = `
width:220px;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
cursor:pointer;
box-shadow:2px 2px 8px rgba(0,0,0,0.1);
text-align:center;
`;

card.innerHTML = `
<h4>${u.name}</h4>
<p>🌍 ${u.country}</p>
<p>👥 ${u.applicants} / ${u.seats}</p>
<p>🔥 경쟁률: ${u.rate}</p>
<p>📈 컷라인: ${cutoff}</p>
<p style="font-weight:bold;color:${color}">
🎯 ${result ? "합격" : "탈락"}
</p>
`;

container.appendChild(card);

});
}

function simulateAssignment(targetUniversity){

  let students = [];

  universityData.forEach(u=>{
    let scores = (u.score_distribution || "")
      .split(",")
      .map(Number)
      .filter(x => !isNaN(x));

    scores.forEach(score=>{
      students.push({
        score: score,
        choices: [u.name],
        currentChoice: 0,
        assigned: null
      });
    });
  });

  students.push({
    score: myScore,
    choices: [targetUniversity],
    currentChoice: 0,
    assigned: null,
    me: true
  });

  students.sort((a,b)=>b.score-a.score);

  let seatsMap = {};
  universityData.forEach(u=>{
    seatsMap[u.name] = Number(u.seats) || 1;
  });

  let changed = true;

  while(changed){
    changed = false;

    let pools = {};

    students.forEach(s=>{
      if(s.assigned === null && s.currentChoice < s.choices.length){
        let uni = s.choices[s.currentChoice];
        if(!pools[uni]) pools[uni] = [];
        pools[uni].push(s);
      }
    });

    for(let uni in pools){

      let candidates = pools[uni].slice();

      students.forEach(s=>{
        if(s.assigned === uni){
          candidates.push(s);
        }
      });

      candidates.sort((a,b)=>b.score-a.score);

      let accepted = candidates.slice(0, seatsMap[uni]);
      let rejected = candidates.slice(seatsMap[uni]);

      accepted.forEach(s=>{
        if(s.assigned !== uni){
          s.assigned = uni;
          changed = true;
        }
      });

      rejected.forEach(s=>{
        if(s.assigned === uni){
          s.assigned = null;
        }
        s.currentChoice++;
      });
    }
  }

  let me = students.find(s=>s.me);
  return me.assigned === targetUniversity;
}  

</script>

</body>
</html>
