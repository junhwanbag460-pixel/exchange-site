<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>전체 대학 지원 현황</title>
</head>

<body style="
text-align:center;
font-family:sans-serif;
">

<h2>전체 대학 지원 현황</h2>

정렬
<button onclick="sortTable('rate')">경쟁률순</button>
<button onclick="sortTable('cutoff')">컷라인순</button>
<button onclick="sortTable('firstChoice')">1지망순</button>
<button onclick="sortTable('seats')">정원순</button>
<br><br>

검색
<input type="text" id="searchBox" placeholder="대학 이름 또는 국가 검색">
<br><br>

<div id="cardContainer" style="
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let universityData=[];
let currentSort="";
  let probabilityCache = {};

let chart;

let rawScore = localStorage.getItem("myScore");
let myScore = rawScore ? Number(Number(rawScore).toFixed(2)) : 0;

function loadStatus(){

fetch(API_URL+"?action=status")
.then(res=>res.json())
.then(data=>{

universityData = data;
probabilityCache = {};
renderCards();;

});
}
/* 검색 기능 */

document.getElementById("searchBox").addEventListener("keyup", function(){
  renderCards();
});

function sortTable(type){

currentSort = type;

universityData.sort((a,b)=>{

let A = a[type];
let B = b[type];

if(type==="rate"){
A = parseFloat(String(A).split(":")[0]) || 0;
B = parseFloat(String(B).split(":")[0]) || 0;
}

else if(type==="cutoff"){
A = parseFloat(A);
B = parseFloat(B);

if(isNaN(A)) A = -1;
if(isNaN(B)) B = -1;
}

else{
A = Number(A) || 0;
B = Number(B) || 0;
}

return B - A;

});

// ⭐ 핵심: 다시 카드 렌더링
renderCards();

}

function calculateProbability(u){

  if(probabilityCache[u.name] !== undefined){
  return probabilityCache[u.name].prob || probabilityCache[u.name];
}

  let baseScores = (u.score_distribution || "")
    .split(",")
    .map(Number)
    .filter(x => !isNaN(x));

  let applicants = Number(u.applicants) || 0;
  let seats = Number(u.seats) || 1;

  if(baseScores.length === 0){
    probabilityCache[u.name] = {
      prob: 50,
      cutoff: myScore
    };
    return 50;
  }

  let trials = 200;
  let passCount = 0;
  let cutoffSum = 0;

  for(let t = 0; t < trials; t++){

    let simulated = [];

    for(let i = 0; i < applicants; i++){
      let rand = baseScores[Math.floor(Math.random() * baseScores.length)];
      simulated.push(rand);
    }

    simulated.push(myScore);

    simulated.sort((a,b)=>b-a);

    let cutoff = simulated[seats - 1] || simulated[simulated.length - 1];
    cutoffSum += cutoff;

    let rank = simulated.indexOf(myScore) + 1;

    if(rank <= seats){
      passCount++;
    }
  }

  let prob = Math.round((passCount / trials) * 100);
  let avgCutoff = cutoffSum / trials;

  if(prob < 5) prob = 5;
  if(prob > 95) prob = 95;

  probabilityCache[u.name] = {
    prob: prob,
    cutoff: Number(avgCutoff.toFixed(2))
  };

  return prob;
}
  
loadStatus();
// setInterval(loadStatus,5000); ← 주석 처리
  
</script>

<!-- ⭐ 여기 붙여 -->
<div id="modal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
z-index:9999;
">

<div style="
background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:10px;
">

<h3 id="modalTitle"></h3>

<br>
<button onclick="closeModal()">닫기</button>

</div>
</div>

<script>
  
function openModal(u){

document.getElementById("modal").style.display="block";

// 컷라인 정리
let prob = calculateProbability(u);
let cutoff = probabilityCache[u.name]?.cutoff;

if(!cutoff) cutoff = myScore;

if(isNaN(cutoff)){
  cutoff = myScore;  // ⭐ 핵심 (중립값)
}

if(typeof cutoff === "number"){
  cutoff = Number(cutoff.toFixed(2));
} else {
  cutoff = myScore;
}

// 상태 판단
let status = "";
let color = "black";

if(prob >= 80){
  status = "🟢 안정";
  color = "green";
}
else if(prob >= 50){
  status = "🟡 적정";
  color = "orange";
}
else{
  status = "🔴 위험";
  color = "red";
}

// 모달 내용 출력
document.getElementById("modalTitle").innerHTML =
u.name + " (" + u.country + ")" +
"<br>합격 확률: <span style='color:"+color+"'>" + prob + "%</span>" +
"<br>상태: " + status +
"<br>내 점수: " + myScore +
"<br>컷라인: " + cutoff +
"<br>지원자: " + u.applicants +
"<br>정원: " + u.seats +
"<br><small style='color:gray'>* 이 확률은 참고용이며 실제 결과와 다를 수 있습니다</small>";

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderCards(){

let container = document.getElementById("cardContainer");
container.innerHTML = "";

let keyword = document.getElementById("searchBox").value.toLowerCase().trim();

let filtered = [...universityData];

// 🔥 검색어 없으면 전체 보여주기
if(keyword !== ""){
  filtered = filtered.filter(u =>
    u.name.toLowerCase().includes(keyword) ||
    u.country.toLowerCase().includes(keyword)
  );
}

// 🔥 데이터 없을 때만 메시지
if(filtered.length === 0){
  container.innerHTML = "<div style='color:#999'>검색 결과 없음</div>";
  return;
}
filtered.forEach(u=>{

let card = document.createElement("div");

card.onclick = () => openModal(u);

let prob = calculateProbability(u);
let cache = probabilityCache[u.name];
let cutoff = cache && cache.cutoff;

if(typeof cutoff !== "number"){
  cutoff = "-";
} else {
  cutoff = cutoff.toFixed(2);
}

let color;
if(prob >= 80) color = "green";
else if(prob >= 50) color = "orange";
else color = "red";
  
card.style = `
width:220px;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
cursor:pointer;
box-shadow:2px 2px 8px rgba(0,0,0,0.1);
text-align:center;
`;

card.innerHTML = `
<h4>${u.name}</h4>
<p>🌍 ${u.country}</p>
<p>👥 ${u.applicants} / ${u.seats}</p>
<p>🔥 경쟁률: ${u.rate}</p>
<p>📈 컷라인: ${cutoff}</p>
<p style="font-weight:bold;color:${color}">
🎯 ${prob}%
</p>
`;

container.appendChild(card);

});
}

</script>

</body>
</html>
