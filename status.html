<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>전체 대학 지원 현황</title>
</head>

<body>

<h2>전체 대학 지원 현황</h2>

정렬
<button onclick="sortTable('rate')">경쟁률순</button>
<button onclick="sortTable('cutoff')">컷라인순</button>
<button onclick="sortTable('firstChoice')">1지망순</button>
<button onclick="sortTable('seats')">정원순</button>
<br><br>

검색
<input type="text" id="searchBox" placeholder="대학 이름 또는 국가 검색">
<br><br>

<div id="cardContainer" style="
display:flex;
flex-wrap:wrap;
gap:15px;
"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNNd5JH9sAqXzl85GvYqImaZOpszJmt9rj_IoZMHnzxuxsIesQwwT6qxWNouwGvjdJZA/exec";

let universityData=[];
let currentSort="";

let chart;

let myScore = Number(localStorage.getItem("myScore")) || 0;  

function loadStatus(){

fetch(API_URL+"?action=status")
.then(res=>res.json())
.then(data=>{

universityData = data;
renderCards();

});
}
/* 검색 기능 */

document.getElementById("searchBox").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase().trim();

let cards=document.querySelectorAll("#cardContainer > div");

cards.forEach(card=>{

let text = card.innerText.toLowerCase();

if(text.includes(keyword)){
card.style.display="";
}else{
card.style.display="none";
}

});

});

function sortTable(type){

currentSort = type;

universityData.sort((a,b)=>{

let A = a[type];
let B = b[type];

if(type==="rate"){
A = parseFloat(String(A).split(":")[0]) || 0;
B = parseFloat(String(B).split(":")[0]) || 0;
}

else if(type==="cutoff"){
A = parseFloat(A);
B = parseFloat(B);

if(isNaN(A)) A = -1;
if(isNaN(B)) B = -1;
}

else{
A = Number(A) || 0;
B = Number(B) || 0;
}

return B - A;

});

// ⭐ 핵심: 다시 카드 렌더링
renderCards();

}

function calculateProbability(cutoff, applicants, seats){

if(!cutoff || applicants === 0 || seats === 0) return 0;

let diff = myScore - cutoff;

// 기본 확률
let prob = 50 + (diff * 10);

// 경쟁률 보정
let rate = applicants / seats;
prob -= (rate - 1) * 10;

// 범위 제한
if(prob > 95) prob = 95;
if(prob < 5) prob = 5;

return Math.round(prob);
}
  
loadStatus();
// setInterval(loadStatus,5000); ← 주석 처리
  
</script>

<!-- ⭐ 여기 붙여 -->
<div id="modal" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
">

<div style="
background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:10px;
">

<h3 id="modalTitle"></h3>
<canvas id="chartCanvas"></canvas>

<br>
<button onclick="closeModal()">닫기</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  
function openModal(u){

document.getElementById("modal").style.display="block";

let ctx = document.getElementById("chartCanvas").getContext("2d");

if(chart) chart.destroy();

let cutoff = parseFloat(u.cutoff);
if(isNaN(cutoff)) cutoff = 0;

// ⭐ 확률 계산
let prob = calculateProbability(cutoff, u.applicants, u.seats);

// ⭐ 색상
let color = prob >= 80 ? "green" :
            prob >= 50 ? "orange" : "red";

// ⭐ 제목 + 정보
document.getElementById("modalTitle").innerHTML =
u.name + " (" + u.country + ")" +
"<br>합격 확률: <span style='color:"+color+"'>" + prob + "%</span>" +
"<br>내 점수: " + myScore +
"<br>컷라인: " + cutoff;

// ⭐ 그래프
chart = new Chart(ctx, {
type: "bar",
data: {
labels: ["내 점수", "컷라인"],
datasets: [{
label: "점수 비교",
data: [myScore, cutoff]
}]
}
});

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function renderCards(){

let container = document.getElementById("cardContainer");
container.innerHTML = "";

universityData.forEach(u=>{

let card = document.createElement("div");

card.style = `
width:220px;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
cursor:pointer;
box-shadow:2px 2px 8px rgba(0,0,0,0.1);
`;

card.innerHTML = `
<h4>${u.name}</h4>
<p>🌍 ${u.country}</p>
<p>👥 ${u.applicants} / ${u.seats}</p>
<p>🔥 경쟁률: ${u.rate}</p>
<p>📈 컷라인: ${u.cutoff}</p>
`;

card.onclick = () => openModal(u);

container.appendChild(card);

});

}
  
</script>

</body>
</html>
